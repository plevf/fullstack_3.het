<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <a href="../">Back to homepage</a>
    <hr>
    <div class="mb-3" style="width: 300px;">
        <label for="name">Teljes név:</label><br>
        <input type="text" class="form-control" id="name" name="name" maxlength="50"><br>
    </div>
    <!-- a maxlength a maximum karakter számot adja meg, amit be lehet írni -->
    <div class="mb-3" style="width: 300px;">
        <label for="email">Email:</label><br>
        <input type="email" class="form-control" id="email" name="email"><br>
    </div>

    <input type="radio" class="form-check-input" id="hallgato" name="ki" value="Hallgató"> <!-- a valuet a szerver latja -->
    <label for="hallgato">Hallgató</label><br>
    
    <input type="radio" class="form-check-input" id="oktato" name="ki" value="Oktató">
    <label for="oktato">Oktató</label><br> <!-- a for miatt nem csak a pöttyre kattintva lehet választani, hanem a szövegre is -->
    
    <input type="radio" class="form-check-input" id="kulsos" name="ki" value="Külsős"> <!-- a name azert kell, hogy egy csoportba tartozzanak a rádiógombok, így csak egyet lehet kiválasztani -->
    <label for="kulsos">Külsős</label><br>

    <div class="mb-3" style="width: 300px;">
        <label for="targy">Üzenet tárgya:</label><br>
        <input type="text" class="form-control" id="targy" name="uz"><br>
    </div>

    <div class="mb-3" style="width: 300px;">
        <label for="tart">Üzenet:</label><br>
        <input type="text" class="form-control" id="tart" name="uztart"><br>
    </div>

    <button type="button" class="btn btn-dark">Elküldöm</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
